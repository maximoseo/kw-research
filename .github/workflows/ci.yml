name: CI

on:
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm test

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Next.js
        run: npm run build
        env:
          JWT_SECRET: ci-dummy-jwt-secret-for-build
          DATABASE_URL: file:./data/ci.db

      - name: Start dev server
        run: |
          npm run start &
          npx wait-on --timeout 60000 http://localhost:3001
        env:
          JWT_SECRET: ci-dummy-jwt-secret-for-build
          DATABASE_URL: file:./data/ci.db
          BASE_URL: http://localhost:3001

      - name: Run Playwright smoke tests
        run: npx playwright test e2e/journeys.spec.ts
        env:
          BASE_URL: http://localhost:3001

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
