    <title>אודות אקו גארד</title>
    <meta
      name="description"
      content="מידע על אקו גארד ועל פתרונות סינון המים שהיא מספקת ללקוחות בישראל."
    />
  </head>
  <body>
    <main>
      <h1>אודות אקו גארד</h1>
      <p>
        אקו גארד מתמחה בסינון מי שתייה לבתים, מסעדות, מרפאות ומשרדים. החברה לא
        מוכרת בריכות, ציוד תעשייתי כבד או פתרונות שאינם קשורים למי שתייה.
      </p>
      <h2>קהל יעד</h2>
      <p>בעלי בתים, מנהלי משרדים, מסעדות, רופאי שיניים ומנהלי נכסים.</p>
    </main>
  </body>
